<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1f2937">
  <title>OurApp - D & M</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen pb-20">
  <div id="app">
    <header class="fixed top-0 left-0 right-0 bg-gray-800 border-b border-gray-700 z-40 px-4 py-3 flex justify-between items-center">
      <h1 class="text-lg font-semibold text-gray-100">D & M</h1>
      <div class="flex items-center gap-3">
        <button id="alarmBtn" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition" title="Enable Alarms">
          <i data-lucide="bell" class="w-5 h-5"></i>
        </button>
        <button id="userToggle" class="px-3 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 transition text-sm font-medium">
          User: D
        </button>
      </div>
    </header>

    <main class="pt-16 px-4 pb-4">
      <div id="scheduleTab" class="tab-content hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold">Schedule</h2>
          <button id="addScheduleBtn" class="p-2 rounded-lg bg-emerald-600 hover:bg-emerald-500">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
        </div>
        <div id="scheduleList" class="space-y-3"></div>
      </div>

      <div id="calendarTab" class="tab-content hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold">Calendar</h2>
          <button id="addEventBtn" class="p-2 rounded-lg bg-emerald-600 hover:bg-emerald-500">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
        </div>
        <div id="eventsList" class="space-y-3"></div>
      </div>

      <div id="budgetTab" class="tab-content hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold">Budget <span id="currentMonth" class="text-sm text-gray-400 font-normal"></span></h2>
          <button id="addBudgetBtn" class="p-2 rounded-lg bg-emerald-600 hover:bg-emerald-500">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="bg-gray-800 rounded-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-700">
              <tr>
                <th class="px-4 py-2 text-left text-sm font-medium">Item</th>
                <th class="px-4 py-2 text-right text-sm font-medium">Cost</th>
                <th class="px-4 py-2 text-center text-sm font-medium">User</th>
                <th class="px-2 py-2"></th>
              </tr>
            </thead>
            <tbody id="budgetList"></tbody>
            <tfoot class="bg-gray-700">
              <tr>
                <td class="px-4 py-3 font-semibold">Total</td>
                <td id="budgetTotal" class="px-4 py-3 text-right font-bold text-emerald-400">$0</td>
                <td colspan="2"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <div id="groceriesTab" class="tab-content hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold">Groceries</h2>
          <div class="flex gap-2">
            <button id="clearGroceriesBtn" class="p-2 rounded-lg bg-red-600 hover:bg-red-500" title="Clear All">
              <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
            <button id="addGroceryBtn" class="p-2 rounded-lg bg-emerald-600 hover:bg-emerald-500">
              <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
        <div id="groceriesList" class="space-y-2"></div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 z-40">
      <div class="flex justify-around py-2">
        <button class="tab-btn flex flex-col items-center p-2 text-emerald-400" data-tab="schedule">
          <i data-lucide="calendar" class="w-6 h-6"></i>
          <span class="text-xs mt-1">Schedule</span>
        </button>
        <button class="tab-btn flex flex-col items-center p-2 text-gray-400" data-tab="calendar">
          <i data-lucide="calendar-days" class="w-6 h-6"></i>
          <span class="text-xs mt-1">Calendar</span>
        </button>
        <button class="tab-btn flex flex-col items-center p-2 text-gray-400" data-tab="budget">
          <i data-lucide="wallet" class="w-6 h-6"></i>
          <span class="text-xs mt-1">Budget</span>
        </button>
        <button class="tab-btn flex flex-col items-center p-2 text-gray-400" data-tab="groceries">
          <i data-lucide="shopping-cart" class="w-6 h-6"></i>
          <span class="text-xs mt-1">Groceries</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl p-6 w-full max-w-sm">
      <h3 id="modalTitle" class="text-lg font-semibold mb-4"></h3>
      <div id="modalContent"></div>
      <div class="flex gap-3 mt-6">
        <button id="modalCancel" class="flex-1 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">Cancel</button>
        <button id="modalSave" class="flex-1 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 transition">Save</button>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
